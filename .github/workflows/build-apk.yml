name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build Web App
        run: cd frontend && npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Copy web assets
        run: |
          mkdir -p frontend/android/app/src/main/assets
          cp -r frontend/dist/* frontend/android/app/src/main/assets/

      - name: Setup project files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > frontend/android/local.properties
          
          cat > frontend/android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "UmiHotel"
          include ':app'
          EOF

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.5/bin/gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: umi-hotel-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk