name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List files
        run: ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build Web App
        run: cd frontend && npm run build

      - name: Check build output
        run: ls -la frontend/dist

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Debug - List Android files
        run: ls -la

      - name: Build Debug APK
        run: |
          mkdir -p android/app/src/main/assets
          cp -r frontend/dist/* android/app/src/main/assets/
          mkdir -p android/app/src/main/java/com/umi/hotel
          mkdir -p android/app/src/main/res/values
          
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.umi.hotel">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="U'mi Hotel" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          cat > android/app/src/main/java/com/umi/hotel/MainActivity.java << 'EOF'
          package com.umi.hotel;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF
          
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">U'mi Hotel</string></resources>
          EOF
          
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><color name="primary">#006D36</color><color name="white">#FFFFFF</color></resources>
          EOF
          
          cat > android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"><item name="colorPrimary">@color/primary</item></style></resources>
          EOF
          
          cat > android/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.umi.hotel'
              compileSdk 34
              defaultConfig {
                  applicationId "com.umi.hotel"
                  minSdk 22
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF
          
          cat > android/settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "UmiHotel"
          include ':app'
          EOF
          
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: umi-hotel-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk