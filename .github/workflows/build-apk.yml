name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Show files
        run: ls -la

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup Android
        uses: android-actions/setup-android@v2

      - name: Create Android Shell
        run: |
          mkdir -p frontend/android/app/src/main/assets
          cp -r frontend/dist/* frontend/android/app/src/main/assets/
          mkdir -p frontend/android/app/src/main/java/com/umi/hotel
          mkdir -p frontend/android/app/src/main/res/values

      - name: Write Files
        run: |
          cat > frontend/android/app/src/main/AndroidManifest.xml << 'EOFMANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.umi.hotel">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="Umi Hotel">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOFMANIFEST

      - name: Write MainActivity
        run: |
          cat > frontend/android/app/src/main/java/com/umi/hotel/MainActivity.java << 'EOFJAVA'
          package com.umi.hotel;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.webkit.WebView;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOFJAVA

      - name: Write Resources
        run: |
          cat > frontend/android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Umi Hotel</string></resources>
          EOF
          
          cat > frontend/android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><color name="primary">#006D36</color><color name="white">#FFFFFF</color></resources>
          EOF
          
          cat > frontend/android/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"><item name="colorPrimary">@color/primary</item></style></resources>
          EOF

      - name: Write build.gradle
        run: |
          cat > frontend/android/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.umi.hotel'
              compileSdk 34
              defaultConfig {
                  applicationId "com.umi.hotel"
                  minSdk 22
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Write settings.gradle
        run: |
          cat > frontend/android/settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral() } }
          rootProject.name = "UmiHotel"
          include ':app'
          EOF

      - name: Write gradle.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > frontend/android/local.properties
          echo "org.gradle.jvmargs=-Xmx2048m" > frontend/android/gradle.properties

      - name: Build
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --info 2>&1 | head -200

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk