name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build Web App
        run: cd frontend && npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Copy web assets
        run: |
          mkdir -p frontend/android/app/src/main/assets
          rm -rf frontend/android/app/src/main/assets/*
          cp -r frontend/dist/* frontend/android/app/src/main/assets/

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # Remove duplicate files
          rm -f app/src/main/res/values/strings.xml app/src/main/res/values/colors.xml
          
          # Write minimal resources only if not exist
          if [ ! -f app/src/main/res/values/strings.xml ]; then
            cat > app/src/main/res/values/strings.xml << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <resources>
                <string name="app_name">Umi Hotel</string>
            </resources>
            EOF
          fi
          
          if [ ! -f app/src/main/res/values/colors.xml ]; then
            cat > app/src/main/res/values/colors.xml << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <resources>
                <color name="primary">#006D36</color>
                <color name="white">#FFFFFF</color>
            </resources>
            EOF
          fi
          
          # Download gradle
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.5/bin/gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: umi-hotel-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk