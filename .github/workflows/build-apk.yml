name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build Web App
        run: cd frontend && npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Copy web assets
        run: |
          cp -r frontend/dist/* frontend/android/app/src/main/assets/
          ls frontend/android/app/src/main/assets/

      - name: Create gradle wrapper files
        working-directory: ./frontend/android
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          
          cat > gradle/wrapper/gradle.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Write gradlew script
        run: |
          cat > frontend/android/gradlew << 'GRADLEW'
          #!/bin/sh
          APP_NAME="Gradle"
          APP_BASE_NAME=$(basename "$0")
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
          GRADLE_HOME=$(mktemp -d)
          GRADLE_USER_HOME="${GRADLE_USER_HOME:-${HOME}/.gradle}"
          
          if [ -z "$GRADLE_HOME" ]; then
            GRADLE_HOME=$(dirname "$0")/..
          fi
          
          CLASSPATH=$GRADLE_HOME/gradle/wrapper/gradle-wrapper.jar
          
          CLASSPATH=$CLASSPATH:$GRADLE_HOME/gradle/wrapper/gradle-wrapper.properties
          
          exec java $DEFAULT_JVM_OPTS -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x frontend/android/gradlew

      - name: Write settings.gradle
        run: |
          cat > frontend/android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "UmiHotel"
          include ':app'
          EOF

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > frontend/android/local.properties

      - name: Build Debug APK
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: umi-hotel-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk